name: AI Code Review (Claude)

on:
  pull_request:
    branches: [J92-FanClub]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        # Ưu tiên cài deps của project (nếu có). Nếu repo chưa có lockfile hoặc thiếu eslint, vẫn đảm bảo có undici.
        run: |
          npm ci || true
          npm i undici --no-audit --no-fund || true

      # ===================== ESLint & Issue =====================
      - name: Lint (ESLint JSON)
        # Tạo báo cáo JSON để máy đọc; không làm fail job ngay (để còn tạo issue & chạy AI review)
        run: |
          npx eslint . -f json -o eslint-report.json || true

      - name: Upload ESLint report (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eslint-report
          path: eslint-report.json

      - name: Create/Update Issue from ESLint errors
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          node scripts/eslint-to-issues.mjs eslint-report.json

      # ===================== AI Review (giữ nguyên nghiệp vụ) =====================
      - name: Run Claude review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: claude-sonnet-4-5
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          node scripts/review.js

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-review-output
          path: |
            review.md
            issues.json

      - name: Post PR comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          node scripts/post_comment.js

      - name: Create Issues for High/Critical
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          node scripts/create_issues.js
