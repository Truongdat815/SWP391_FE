name: Deploy Frontend
on:
  push:
    branches:
      - develop

jobs:
  build_and_deploy:
    runs-on: [self-hosted]
    
    env:
      CONTAINER_NAME: frontendContainer
      IMAGE_NAME: fe_tixclick
      IMAGE_TAG: latest
      PORT_HOST: 5173
      PORT_CONTAINER: 5173
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # GỘP TẤT CẢ LOGIC DEPLOY VÀO MỘT BƯỚC DUY NHẤT
      - name: Deploy Frontend via Single PowerShell Script
        shell: powershell
        run: |
          # 1. Khắc phục lỗi Execution Policy cho phiên làm việc này
          Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope Process
          
          # 2. Định nghĩa biến để dễ dùng hơn trong script
          $CNAME = "${{ env.CONTAINER_NAME }}"
          $IMAGE_FULL = "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          $PORTMAP = "${{ env.PORT_HOST }}:${{ env.PORT_CONTAINER }}"
          
          # 3. Xóa Image cũ
          Write-Host ":: Removing old Docker image if exists..."
          docker rmi -f $IMAGE_FULL | Out-Null
          
          # 4. Build Image mới
          Write-Host ":: Building Docker image for frontend..."
          docker build -t $IMAGE_FULL -f ./Dockerfile .
          
          # 5. Dừng và Xóa Container cũ (Logic IF)
          $ContainerId = docker ps -aq -f name=$CNAME
          
          if ($ContainerId) {
              Write-Host ":: Stopping and removing existing container - $CNAME"
              docker stop $CNAME
              docker rm $CNAME
          } else {
              Write-Host ":: No existing container '$CNAME' found. Skipping stop/remove."
          }
          
          # 6. Chạy Container mới
          Write-Host ":: Running new frontend container - $CNAME"
          docker run -d -p $PORTMAP --name $CNAME $IMAGE_FULL
          
          # 7. Dọn dẹp Image không dùng
          Write-Host ":: Cleaning up unused Docker images..."
          docker system prune -af
