name: Deploy Frontend
on:
  push:
    branches:
      - develop

jobs:
  build_and_deploy:
    runs-on: [self-hosted]
    
    # Định nghĩa biến môi trường
    env:
      CONTAINER_NAME: frontendContainer
      IMAGE_NAME: fe_tixclick
      IMAGE_TAG: latest
      PORT_HOST: 5173
      PORT_CONTAINER: 5173
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 1. BƯỚC KHẮC PHỤC LỖI SECURITY TRIỆT ĐỂ (Execution Policy)
      # Sử dụng CMD để gọi PowerShell, dùng 'Bypass' để vượt qua hạn chế ban đầu.
      - name: Force Set PowerShell Execution Policy
        shell: cmd 
        run: |
          powershell.exe -ExecutionPolicy Bypass -Command "Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope Process"
        
      # 2. Xóa Image cũ
      - name: Remove Old Docker Image if Exists
        # BẮT BUỘC chỉ định shell: powershell để áp dụng chính sách mới
        shell: powershell
        run: docker rmi -f ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} | Out-Null
        
      # 3. Build Image mới
      - name: Build Docker Image
        shell: powershell
        run: |
          Write-Host ":: Building Docker image for frontend..."
          docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} -f ./Dockerfile .

      # 4. Dừng và Xóa Container cũ
      - name: Stop and Remove Existing Container if Any
        shell: powershell
        run: |
          $CNAME = "${{ env.CONTAINER_NAME }}"
          
          # Kiểm tra xem container có tồn tại không
          $ContainerId = docker ps -aq -f name=$CNAME
          
          if ($ContainerId) {
              Write-Host ":: Stopping and removing existing container - $CNAME"
              docker stop $CNAME
              docker rm $CNAME
          } else {
              Write-Host ":: No existing container '$CNAME' found. Skipping stop/remove."
          }

      # 5. Chạy Container mới
      - name: Run New Docker Container
        shell: powershell
        run: |
          $CNAME = "${{ env.CONTAINER_NAME }}"
          $IMAGE = "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          $PORTMAP = "${{ env.PORT_HOST }}:${{ env.PORT_CONTAINER }}"
          
          Write-Host ":: Running new frontend container - $CNAME"
          docker run -d -p $PORTMAP --name $CNAME $IMAGE

      # 6. Dọn dẹp Image không dùng
      - name: Cleanup Unused Docker Images
        shell: powershell
        run: |
          Write-Host ":: Cleaning up unused Docker images..."
          docker system prune -af
