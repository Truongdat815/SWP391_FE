name: CI/CD Frontend

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: windows-latest

    env:
      CONTAINER_NAME: swp391-fe-container
      IMAGE_NAME: swp391-fe
      IMAGE_TAG: latest
      PORT_HOST: 8080
      PORT_CONTAINER: 80

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy Frontend via PowerShell
        shell: powershell
        run: |
          # Bypass Execution Policy cho process này
          Set-ExecutionPolicy -ExecutionPolicy Bypass -Scope Process -Force

          Write-Host "=== Deploy start ==="

          $CNAME = "${{ env.CONTAINER_NAME }}"
          $IMAGE_FULL = "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          $PORTMAP = "${{ env.PORT_HOST }}:${{ env.PORT_CONTAINER }}"

          Write-Host ":: Building Docker image..."
          docker build -t $IMAGE_FULL -f ./Dockerfile .

          $ContainerId = docker ps -aq -f name=$CNAME
          if ($ContainerId) {
            Write-Host ":: Stopping existing container..."
            try {
              docker stop $CNAME
            } catch {
              Write-Host "Warning: stop failed"
            }

            Write-Host ":: Removing existing container..."
            try {
              docker rm $CNAME
            } catch {
              Write-Host "Warning: rm failed"
            }
          } else {
            Write-Host ":: No existing container found. Skipping stop/rm."
          }

          Write-Host ":: Running new frontend container..."
          docker run -d -p $PORTMAP --name $CNAME $IMAGE_FULL

          Write-Host ":: Cleaning up unused Docker images..."
          docker system prune -af

          Write-Host "=== Deploy finished successfully ==="
